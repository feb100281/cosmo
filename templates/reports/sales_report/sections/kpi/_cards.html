<div class="kpi-metrics-grid">
  <div class="kpi-metric-item">
    <div class="kpi-metric-icon">₽</div>
    <div class="kpi-metric-content">
      <div class="kpi-metric-label">Оборот</div>
      <div class="kpi-metric-value">{{ cards.dt }}</div>
    </div>
  </div>

  <div class="kpi-metric-item">
    <div class="kpi-metric-icon">↩</div>
    <div class="kpi-metric-content">
      <div class="kpi-metric-label">Возвраты</div>
      <div class="kpi-metric-value">{{ cards.cr }}</div>
      {% if cards.rtr_ratio and cards.rtr_ratio != "—" %}
        <span class="kpi-metric-badge">{{ cards.rtr_ratio }}</span>
      {% endif %}
    </div>
  </div>

  <div class="kpi-metric-item">
    <div class="kpi-metric-icon">✓</div>
    <div class="kpi-metric-content">
      <div class="kpi-metric-label">Чистая выручка</div>
      <div class="kpi-metric-value">{{ cards.amount }}</div>

      {% if cards.amount_services and cards.amount_services != "—" %}
        <div class="kpi-subtext">
          в т.ч. услуги: {{ cards.amount_services }}
        </div>
      {% endif %}
    </div>
  </div>

</div>
